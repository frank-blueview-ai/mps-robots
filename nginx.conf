worker_processes 1;

error_log C:/Users/fperez/xcode/mps-robots/runtime/nginx/error.log;
pid C:/Users/fperez/xcode/mps-robots/runtime/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include C:/Users/fperez/xcode/mps-robots/tools/nginx-1.30.1/conf/mime.types;
    default_type application/octet-stream;

    access_log C:/Users/fperez/xcode/mps-robots/runtime/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path C:/Users/fperez/xcode/mps-robots/runtime/nginx/client_body_temp;
    proxy_temp_path C:/Users/fperez/xcode/mps-robots/runtime/nginx/proxy_temp;
    fastcgi_temp_path C:/Users/fperez/xcode/mps-robots/runtime/nginx/fastcgi_temp;
    uwsgi_temp_path C:/Users/fperez/xcode/mps-robots/runtime/nginx/uwsgi_temp;
    scgi_temp_path C:/Users/fperez/xcode/mps-robots/runtime/nginx/scgi_temp;

    server {
        listen 127.0.0.1:8080;
        server_name localhost 127.0.0.1;

        root C:/Users/fperez/xcode/mps-robots/web;
        index index.html;

        location = /Ora-move.js {
            alias C:/Users/fperez/xcode/mps-robots/Ora-move.js;
            default_type application/javascript;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /ora/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type" always;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://10.1.48.113/;
            proxy_http_version 1.1;
            proxy_set_header Host 10.1.48.113;
            proxy_set_header Connection "";
            proxy_read_timeout 10s;
            proxy_connect_timeout 3s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        location /bridge/ {
            proxy_pass http://127.0.0.1:8787/;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:8787;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_connect_timeout 3s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }
    }
}
